<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumi Hub - Kies je Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared-style.css">
    <link rel="stylesheet" href="hub-style.css">
</head>
<body class="animated-bg h-screen w-screen overflow-x-hidden flex items-center justify-center relative p-4">

    <div id="login-overlay" class="fixed inset-0 z-[100] bg-black/60 backdrop-blur-md flex items-center justify-center p-4" style="display: none;">
        <div class="glass-panel p-8 max-w-md w-full text-center border-t-8 border-[#95c11f]">
            <h2 class="text-3xl font-black text-[#006d33] mb-2">Hoi! Wie ben jij?</h2>
            <p class="text-gray-600 mb-4 font-semibold">Voer je Lumi-Code in om je album te openen.</p>
            
            <div class="bg-[#f0f9eb] border border-[#95c11f]/30 p-3 rounded-xl mb-4 text-sm text-[#006d33] leading-relaxed">
                <strong>Instructie:</strong> Gebruik je voornaam + verjaardag.<br>
                <span class="opacity-75 italic">(bijv: voornaam+verjaardag dus <strong>dave1903</strong>)</span>
            </div>

            <input type="text" id="lumi-id-input" placeholder="VOORNAAM+DATUM" class="w-full p-4 rounded-2xl border-2 border-[#95c11f] outline-none text-center text-xl font-bold mb-4 focus:ring-4 ring-[#95c11f]/20 transition-all uppercase">
            <button onclick="loginUser()" class="btn-jelly w-full bg-[#006d33] text-white py-4 rounded-2xl font-black text-xl shadow-lg hover:bg-[#005528] transition-colors">STARTEN</button>
        </div>
    </div>

    <button onclick="openAlbum()" class="absolute top-4 right-4 z-50 bg-white/20 backdrop-blur-md border border-white/50 text-[#006d33] bg-white px-4 py-2 rounded-full font-bold shadow-lg hover:bg-white/90 transition flex items-center gap-2">
        📖 Mijn Album
    </button>

    <div class="hub-container glass-panel relative z-10 w-full">
        <img src="logoikc.svg" alt="IKC Binnenstebuiten" class="h-20 mx-auto mb-6 opacity-90" onerror="this.style.display='none'">
        <h1>Welkom bij Lumi! 👋</h1>
        <p id="welcome-text">Welke bot wil je vandaag gebruiken?</p>

        <div class="bot-grid">
            <div class="bot-card" onclick="window.location.href='actua-lumi.html'">
                <img src="lumi1.jpeg" alt="Actua" onerror="this.src='https://raw.githubusercontent.com/Lumi-Bot/Lumi-Assets/main/lumi-vogel.png'">
                <h3>Actua Lumi</h3>
            </div>
            <div class="bot-card" onclick="window.location.href='boekverslag-lumi.html'">
                <img src="lumi2.jpeg" alt="Boekverslag" onerror="this.src='https://raw.githubusercontent.com/Lumi-Bot/Lumi-Assets/main/lumi-vogel.png'">
                <h3>Boekverslag Lumi</h3>
            </div>
            <div class="bot-card" onclick="window.location.href='rekenbot-lumi.html'">
                <img src="lumi3.png" alt="Rekenbot" onerror="this.src='https://raw.githubusercontent.com/Lumi-Bot/Lumi-Assets/main/lumi-vogel.png'">
                <h3>Rekenbot Lumi</h3>
            </div>
        </div>
    </div>

    <div id="album-overlay">
        <button onclick="closeAlbum()" class="close-sticky-btn">❌</button>
        <div class="album-content-wrapper">
            <h1 class="text-4xl font-black text-white mb-6">📖 Mijn Spaarboek</h1>
            <div class="w-[90%] bg-black/30 rounded-full h-6 mb-8 relative border border-white/30">
                <div id="album-progress" class="h-full bg-gradient-to-r from-[#006d33] to-[#95c11f] rounded-full transition-all duration-1000" style="width: 0%"></div>
                <span id="album-stats" class="absolute inset-0 flex items-center justify-center text-xs font-bold text-white uppercase tracking-widest">Laden...</span>
            </div>
            <div id="album-grid-container" class="album-grid"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBoohDPXVol8kLllJ6ox28xOfQd5fBdLc8",
            authDomain: "lumi-binnenstebuiten.firebaseapp.com",
            projectId: "lumi-binnenstebuiten",
            storageBucket: "lumi-binnenstebuiten.firebasestorage.app",
            messagingSenderId: "776211154870",
            appId: "1:776211154870:web:998936db277f8c92a8a317"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentLumiID = "";
        let userCards = [];

        const allCards = ["Lumi - Ajax kaart.jpeg", "Lumi - AZ Kaart.jpeg", "Lumi - Excelsior kaart.jpeg", "Lumi - FC Groningen kaart.jpeg", "Lumi - Fc Twente kaart.jpeg", "Lumi - Fc Utrecht kaart.jpeg", "Lumi - Feyenoord kaart.jpeg", "Lumi - Fortuna Sittard kaart.jpeg", "Lumi - GAE Kaart.jpeg", "Lumi - Heracles Almelo Kaart.jpeg", "Lumi - Jonge kracht kaart.jpeg", "Lumi - NAC Breda kaart.jpeg", "Lumi - NEC kaart.jpeg", "Lumi - PEC Zwolle kaart.jpeg", "Lumi - PSV kaart.jpeg", "Lumi - RKHVV kaart.jpeg", "Lumi - SC Heerenveen kaart.jpeg", "Lumi - Sparta rotterdam kaart.jpeg", "Lumi - Telstar Kaart.jpeg", "Lumi - Vitesse kaart.jpeg", "Lumi - Volendam Kaart.jpeg", "Lumi - Westervoort kaart.jpeg"];

        window.loginUser = function() {
            const id = document.getElementById('lumi-id-input').value.trim().toLowerCase(); // We slaan alles op in kleine letters
            if(!id) return;
            currentLumiID = id;
            sessionStorage.setItem('lumi_user_id', id);
            document.getElementById('login-overlay').style.display = 'none';
            loadData();
        }

        async function loadData() {
            const userRef = doc(db, "users", currentLumiID);
            onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    userCards = docSnap.data().collection || [];
                } else {
                    setDoc(userRef, { collection: [] });
                    userCards = [];
                }
                document.getElementById('welcome-text').innerText = `Hoi ${currentLumiID}! Welke bot kies je?`;
                updateProgress();
            });
        }

        function updateProgress() {
            const stats = document.getElementById('album-stats');
            const percentage = (userCards.length / allCards.length) * 100;
            document.getElementById('album-progress').style.width = `${percentage}%`;
            stats.innerText = `${userCards.length} / ${allCards.length} Verzameld`;
        }

        window.openAlbum = function() {
            const grid = document.getElementById('album-grid-container');
            grid.innerHTML = "";
            allCards.forEach((cardFile, index) => {
                const isOwned = userCards.includes(cardFile);
                const slot = document.createElement('div');
                slot.className = `album-slot ${isOwned ? 'unlocked' : 'locked'}`;
                if(isOwned) {
                    const img = document.createElement('img');
                    img.src = cardFile; 
                    slot.appendChild(img);
                    slot.onclick = () => window.open(cardFile, '_blank');
                } else {
                    slot.innerHTML = `<div class="mystery-mark">?</div>`;
                }
                slot.innerHTML += `<div class="slot-number">#${index+1}</div>`;
                grid.appendChild(slot);
            });
            document.getElementById('album-overlay').style.display = 'block';
        }

        window.closeAlbum = () => document.getElementById('album-overlay').style.display = 'none';

        const saved = sessionStorage.getItem('lumi_user_id');
        if(saved) { currentLumiID = saved; loadData(); } 
        else { document.getElementById('login-overlay').style.display = 'flex'; }
    </script>
</body>
</html>
