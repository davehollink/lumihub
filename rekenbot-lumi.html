<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumi's Rekenlab - De Boomhut</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <link rel="stylesheet" href="shared-style.css">
</head>
<body class="animated-bg h-screen w-screen overflow-hidden flex items-center justify-center relative">

    <button onclick="window.location.href='hub.html'" class="absolute top-4 left-4 z-50 bg-white/90 backdrop-blur-md border border-white/50 text-[#006d33] px-4 py-2 rounded-full font-bold shadow-lg hover:bg-white transition flex items-center gap-2">
        🏠 Terug naar Hub
    </button>

    <div class="bubble w-24 h-24 left-[10%] animation-delay-0"></div>
    <div class="bubble w-12 h-12 left-[30%] animation-delay-2000"></div>
    <div class="bubble w-32 h-32 left-[70%] animation-delay-4000"></div>
    <div class="bubble w-16 h-16 left-[90%] animation-delay-1000"></div>

    <main class="glass-panel w-full max-w-6xl h-[95vh] rounded-[40px] flex flex-col md:flex-row shadow-2xl relative z-10 m-4 overflow-hidden">
        
        <aside class="w-full md:w-1/3 bg-white/40 border-b md:border-b-0 md:border-r border-white/50 p-6 flex flex-col items-center justify-between relative">
            <div class="w-full flex flex-col items-center">
                <img src="logoikc.svg" alt="IKC" class="h-12 opacity-80 mb-4" onerror="this.style.display='none'">
                <div class="bg-[#ef7d00] text-white text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider mb-2 shadow-sm">Rekenlab</div>
                <h1 class="text-[#006d33] text-2xl font-extrabold text-center leading-tight">Lumi's<br>Boomhut</h1>
            </div>

            <div class="relative z-20 -my-4 md:-my-8 group cursor-pointer" onclick="lumiPoke()">
                <img src="lumi3.png" id="lumi-img" class="w-48 md:w-64 h-auto object-contain lumi-float drop-shadow-2xl filter hover:brightness-110 transition duration-300" 
                     alt="Lumi" onerror="this.src='https://raw.githubusercontent.com/Lumi-Bot/Lumi-Assets/main/lumi-vogel.png'; this.onerror=null;">
                <div class="absolute top-0 right-0 bg-white text-[#006d33] font-bold px-4 py-2 rounded-xl rounded-bl-none shadow-lg transform scale-0 group-hover:scale-100 transition-transform origin-bottom-left border-2 border-[#95c11f]">
                    Hoi! 👋
                </div>
            </div>

            <div class="w-full bg-white/60 rounded-2xl p-4 shadow-sm border border-white">
                <div class="flex justify-between items-center border-b border-gray-200/50 pb-2 mb-2">
                    <span class="text-gray-500 font-semibold text-sm uppercase">Score</span>
                    <span id="score-display" class="text-2xl font-black text-[#ef7d00]">0</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-gray-500 font-semibold text-sm uppercase">Streak 🔥</span>
                    <span id="streak-display" class="text-xl font-bold text-[#95c11f]">0</span>
                </div>
            </div>

            <div class="w-full flex gap-2 mt-4 md:mt-0">
                <button onclick="backToMenu()" class="btn-jelly flex-1 bg-white text-[#006d33] hover:bg-[#e8f5e9] py-3 rounded-xl font-bold shadow-sm border border-[#006d33]/20 transition text-sm flex flex-col items-center justify-center gap-1">
                    <span class="text-xl">🔄</span>
                    <span>Oefenen</span>
                </button>
                <button onclick="startQuizSetup()" class="btn-jelly flex-1 bg-gradient-to-r from-[#ef7d00] to-[#ff9f43] text-white hover:shadow-lg py-3 rounded-xl font-bold shadow-md transition text-sm flex flex-col items-center justify-center gap-1 border-t border-white/30">
                    <span class="text-xl">📝</span>
                    <span>Toets</span>
                </button>
            </div>
        </aside>

        <section class="flex-1 flex flex-col relative bg-white/30 h-full">
            <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-6 scrollbar-hide scroll-smooth"></div>

            <div class="w-full p-6 bg-gradient-to-t from-white/80 to-transparent z-20">
                <div id="options-container" class="hidden flex flex-wrap gap-2 justify-center mb-4"></div>

                <div class="flex items-center gap-2 bg-white rounded-full p-2 pl-6 shadow-xl border border-gray-100 ring-4 ring-transparent focus-within:ring-[#ef7d00]/20 transition-all">
                    <input type="text" id="user-input" class="flex-1 bg-transparent border-none outline-none text-lg text-gray-700 placeholder-gray-400 font-semibold" placeholder="Typ je antwoord..." autocomplete="off">
                    <button id="send-btn" onclick="handleInput()" class="btn-jelly bg-[#006d33] hover:bg-[#005528] text-white w-12 h-12 rounded-full flex items-center justify-center shadow-md transition transform hover:rotate-12">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6 ml-0.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                        </svg>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        let gameState = 'INTRO';
        let userName = '';
        let currentMode = ''; 
        let currentAnswer = 0;
        let score = 0;
        let streak = 0;
        let isQuizMode = false;
        let quizQuestionCount = 0;
        const QUIZ_TOTAL = 25;
        let quizCorrect = 0;

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const optionsContainer = document.getElementById('options-container');
        const scoreDisplay = document.getElementById('score-display');
        const streakDisplay = document.getElementById('streak-display');
        const lumiImg = document.getElementById('lumi-img');

        window.onload = () => {
            setTimeout(() => addLumiMessage("Hoi! Welkom in mijn boomhut! 🌳"), 600);
            setTimeout(() => addLumiMessage("Ik ben Lumi. Hoe heet jij?", true), 1600);
            gameState = 'NAME';
        };

        function handleInput() {
            const text = userInput.value.trim();
            if (!text) return;
            addUserMessage(text);
            userInput.value = '';

            if (gameState === 'NAME') processName(text);
            else if (gameState === 'PLAYING') checkAnswer(text);
        }

        userInput.addEventListener("keypress", (e) => { 
            if (e.key === "Enter" && !userInput.disabled) handleInput(); 
        });

        function backToMenu() {
            if (gameState === 'INTRO' || gameState === 'NAME') return;
            isQuizMode = false; 
            gameState = 'CHOOSE_MODE';
            addLumiMessage("Even pauze. Wat wil je nu oefenen?", false);
            showModeOptions();
        }

        function startQuizSetup() {
            if (gameState === 'INTRO' || gameState === 'NAME') {
                addLumiMessage("Eerst even kennismaken! Hoe heet je?");
                return;
            }
            isQuizMode = true;
            quizQuestionCount = 0;
            quizCorrect = 0;
            gameState = 'CHOOSE_MODE';
            score = 0; streak = 0; updateScoreBoard();
            addLumiMessage("📝 Tijd voor een overhoring! 25 vragen.", false);
            addLumiMessage("Kies je onderwerp:", false);
            showModeOptions();
        }

        function processName(text) {
            let cleanName = text.replace(/ik heet|mijn naam is|ik ben|hallo|hoi/gi, '').replace(/[.!]/g, '').trim();
            userName = cleanName.charAt(0).toUpperCase() + cleanName.slice(1) || text;
            addLumiMessage(`Gezellig dat je er bent, ${userName}! Wat gaan we doen?`);
            gameState = 'CHOOSE_MODE';
            showModeOptions();
        }

        function showModeOptions() {
            userInput.disabled = true;
            userInput.placeholder = "Maak een keuze...";
            optionsContainer.innerHTML = '';
            optionsContainer.classList.remove('hidden');

            const modes = [
                { id: 'plus', text: 'Plus', icon: '➕', color: 'bg-green-100 text-green-700 border-green-200' },
                { id: 'min', text: 'Min', icon: '➖', color: 'bg-red-100 text-red-700 border-red-200' },
                { id: 'mix_plusmin', text: 'Mix +/-', icon: '🔀', color: 'bg-orange-100 text-orange-700 border-orange-200' },
                { id: 'keer', text: 'Keer', icon: '✖️', color: 'bg-blue-100 text-blue-700 border-blue-200' },
                { id: 'deel', text: 'Delen', icon: '➗', color: 'bg-purple-100 text-purple-700 border-purple-200' },
                { id: 'mix_keerdeel', text: 'Mix ×/:', icon: '🔀', color: 'bg-indigo-100 text-indigo-700 border-indigo-200' },
                { id: 'alles', text: 'Alles', icon: '🎲', color: 'bg-yellow-100 text-yellow-700 border-yellow-200' }
            ];

            modes.forEach(mode => {
                const btn = document.createElement('button');
                btn.className = `btn-jelly ${mode.color} border-2 font-bold py-3 px-5 rounded-2xl shadow-sm hover:shadow-md transition-all flex items-center gap-2 mb-2`;
                btn.innerHTML = `<span class="text-xl">${mode.icon}</span> <span>${mode.text}</span>`;
                btn.onclick = () => setMode(mode.id);
                optionsContainer.appendChild(btn);
            });
            scrollToBottom();
        }

        function setMode(mode) {
            currentMode = mode;
            optionsContainer.classList.add('hidden');
            userInput.disabled = false;
            userInput.placeholder = "Typ het antwoord...";
            userInput.focus();
            
            const msg = isQuizMode ? `Succes ${userName}! We gaan beginnen.` : `Top! We gaan oefenen.`;
            addLumiMessage(msg);
            gameState = 'PLAYING';
            setTimeout(generateQuestion, 1000);
        }

        function generateQuestion() {
            if (gameState !== 'PLAYING') return;

            if (isQuizMode) {
                quizQuestionCount++;
                if (quizQuestionCount > QUIZ_TOTAL) { endQuiz(); return; }
                addLumiMessage(`Vraag ${quizQuestionCount} / ${QUIZ_TOTAL}`, true);
            }

            let activeType = currentMode;
            if (currentMode === 'mix_plusmin') activeType = Math.random() < 0.5 ? 'plus' : 'min';
            else if (currentMode === 'mix_keerdeel') activeType = Math.random() < 0.5 ? 'keer' : 'deel';
            else if (currentMode === 'alles') {
                const types = ['plus', 'min', 'keer', 'deel'];
                activeType = types[Math.floor(Math.random() * types.length)];
            }

            let max = 10 + (Math.floor(score / 5) * 5); 
            if (isQuizMode) max = 20; 

            let a = Math.floor(Math.random() * max) + 1;
            let b = Math.floor(Math.random() * max) + 1;
            let num1, num2, text;

            switch(activeType) {
                case 'plus': num1 = a; num2 = b; currentAnswer = num1 + num2; text = `${num1} + ${num2}`; break;
                case 'min': num1 = Math.max(a, b); num2 = Math.min(a, b); currentAnswer = num1 - num2; text = `${num1} - ${num2}`; break;
                case 'keer': a = Math.floor(Math.random() * 10) + 1; b = Math.floor(Math.random() * 10) + 1; num1 = a; num2 = b; currentAnswer = num1 * num2; text = `${num1} x ${num2}`; break;
                case 'deel': a = Math.floor(Math.random() * 10) + 1; b = Math.floor(Math.random() * 10) + 1; currentAnswer = a; num1 = a * b; num2 = b; text = `${num1} : ${num2}`; break;
            }

            setTimeout(() => addLumiMessage(`<span class="text-4xl font-black text-[#006d33] block mt-1 mb-1 tracking-wide">${text} = ?</span>`, true), 200);
        }

        function checkAnswer(input) {
            const val = parseInt(input);
            if (isNaN(val)) { addLumiMessage("Alleen cijfers typen! 🔢"); return; }

            if (val === currentAnswer) {
                if (isQuizMode) quizCorrect++;
                score++; streak++; updateScoreBoard();
                
                userInput.parentElement.classList.add('ring-[#95c11f]', 'ring-offset-2');
                setTimeout(() => userInput.parentElement.classList.remove('ring-[#95c11f]', 'ring-offset-2'), 500);

                if (isQuizMode) {
                    addLumiMessage("✅ Genoteerd."); 
                    setTimeout(generateQuestion, 800);
                } else {
                    if (streak % 3 === 0) {
                        triggerConfetti();
                        addLumiMessage(`Wow! ${streak} op een rij! 🔥`);
                    } else {
                        const compliments = ["Goed zo!", "Keurig!", "Juist!", "Top!"];
                        addLumiMessage(compliments[Math.floor(Math.random()*compliments.length)]);
                    }
                    setTimeout(generateQuestion, 1000);
                }
            } else {
                streak = 0; updateScoreBoard();
                lumiPoke(); 
                
                userInput.parentElement.classList.add('ring-red-400', 'shake');
                setTimeout(() => userInput.parentElement.classList.remove('ring-red-400', 'shake'), 500);

                if (isQuizMode) {
                    addLumiMessage("❌ Genoteerd.");
                    setTimeout(generateQuestion, 1000);
                } else {
                    addLumiMessage(`Helaas! Het was **${currentAnswer}**.`, false);
                    setTimeout(generateQuestion, 2000);
                }
            }
        }

        function endQuiz() {
            gameState = 'QUIZ_DONE';
            let cijfer = (1 + (9 * (quizCorrect / QUIZ_TOTAL))).toFixed(1);
            if (cijfer === "10.0") cijfer = "10";

            addLumiMessage("🏁 **Einde Toets!**", false);
            setTimeout(() => {
                triggerConfetti(); 
                addLumiMessage(`Resultaat: **${quizCorrect}/${QUIZ_TOTAL}** goed.`);
                addLumiMessage(`<div>Cijfer: <span class="text-2xl font-black bg-[#ef7d00] text-white px-3 py-1 rounded-lg inline-block shadow-md transform -rotate-3 mt-1">${cijfer}</span></div>`);
                
                setTimeout(() => {
                   addLumiMessage("Wil je nog een keer?");
                   gameState = 'CHOOSE_MODE'; isQuizMode = false; showModeOptions();
                }, 4000);
            }, 1000);
        }

        function updateScoreBoard() {
            scoreDisplay.innerText = score;
            streakDisplay.innerText = streak;
            scoreDisplay.parentElement.classList.add('scale-105');
            setTimeout(() => scoreDisplay.parentElement.classList.remove('scale-105'), 200);
        }

        function typeWriter(element, text, speed = 15) {
            let i = 0; userInput.disabled = true; sendBtn.disabled = true; element.classList.add('typing-cursor');
            function type() {
                if (i < text.length) { element.innerHTML += text.charAt(i); i++; scrollToBottom(); setTimeout(type, speed); } 
                else { element.classList.remove('typing-cursor'); if (gameState !== 'CHOOSE_MODE' && gameState !== 'QUIZ_DONE') { userInput.disabled = false; sendBtn.disabled = false; userInput.focus(); } scrollToBottom(); }
            } type();
        }

        function addLumiMessage(text, isQuestion = false) {
            const div = document.createElement('div');
            div.className = "flex w-full fade-in-up justify-start items-end gap-3 pl-2";
            
            const icon = document.createElement('img');
            icon.src = "lumi3.png"; icon.alt = "L"; 
            icon.className = "w-10 h-10 rounded-full object-cover border-2 border-white shadow-md bg-white flex-shrink-0";
            
            const bubble = document.createElement('div');
            const styleClass = isQuestion ? "bg-[#fff8e1] border-[#ffecb3] text-[#5d4037]" : "bg-white border-white text-gray-700";
            bubble.className = `${styleClass} border shadow-sm p-4 rounded-2xl rounded-bl-none text-lg max-w-[85%] font-medium leading-relaxed`;
            
            if (text.includes('<') && text.includes('>')) {
                bubble.innerHTML = text;
                div.appendChild(icon); div.appendChild(bubble); chatContainer.appendChild(div);
                scrollToBottom();
                return;
            }

            div.appendChild(icon); div.appendChild(bubble); chatContainer.appendChild(div);
            typeWriter(bubble, text);
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = "flex w-full fade-in-up justify-end pr-2";
            const bubble = document.createElement('div');
            bubble.className = "bg-[#006d33] text-white shadow-md p-4 rounded-2xl rounded-br-none text-lg max-w-[80%] font-semibold";
            bubble.innerText = text;
            div.appendChild(bubble); chatContainer.appendChild(div); scrollToBottom();
        }

        function scrollToBottom() { chatContainer.scrollTop = chatContainer.scrollHeight; }
        
        function lumiPoke() {
            if(!lumiImg) return;
            lumiImg.classList.remove('lumi-float'); void lumiImg.offsetWidth; lumiImg.classList.add('shake');
            setTimeout(() => { lumiImg.classList.remove('shake'); lumiImg.classList.add('lumi-float'); }, 500);
        }

        function triggerConfetti() {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#ef7d00', '#95c11f', '#006d33', '#ffffff'] });
        }
    </script>
</body>
</html>
